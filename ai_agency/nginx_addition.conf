# ═══════════════════════════════════════════════════════════
# AI Agency Management System — Nginx location блоки
# Добавить ВНУТРЬ существующего server {} блока сайта
# ═══════════════════════════════════════════════════════════

# HQ — корпоративная панель (статические страницы)
location /hq {
    alias /var/www/ai_agency/ai_agency/static/hq/;
    index index.html;
    try_files $uri $uri/ /hq/index.html;
}

# Старые URL панели → AI Команда в HQ (backend отдаёт редирект, если проксируете всё на :8000)
location = /admin {
    return 302 /hq/team.html;
}
location = /panel {
    return 302 /hq/team.html;
}

# Статика панели (CSS, JS, изображения если добавятся)
location /static/ {
    alias /var/www/ai_agency/static/;
    expires 1d;
    add_header Cache-Control "public, immutable";
}

# WebSocket — прогресс задач в реальном времени
# Должен быть ВЫШЕ обычного /api/ чтобы матчился первым
location /ws/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# REST API — все запросы к backend
location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_connect_timeout 10s;

    proxy_buffering off;
}
