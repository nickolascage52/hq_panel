<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Delivery — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/hq/style.css" />
  <link rel="stylesheet" href="/hq/_base.css" />
  <style>
    body.hq-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 30%, rgba(0,212,255,0.06), transparent 60%), #0a0a0a;
      padding: 16px;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--hq-card, #111);
      border: 1px solid var(--hq-border, rgba(255,255,255,0.08));
      border-radius: 16px;
      padding: 36px 32px 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      color: var(--hq-text, #fff);
      margin-bottom: 4px;
    }
    .login-brand .logo-mark {
      color: var(--hq-cyan, #00d4ff);
      font-size: 22px;
    }
    .login-tagline {
      font-size: 13px;
      color: var(--hq-text-secondary, #9ca3af);
      margin-bottom: 24px;
    }
    .login-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--hq-text, #fff);
    }
    .login-form { display: flex; flex-direction: column; gap: 12px; }
    .login-field { display: flex; flex-direction: column; gap: 6px; }
    .login-field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--hq-text-secondary, #9ca3af);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-field input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--hq-text, #fff);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-field input:focus {
      border-color: var(--hq-cyan, #00d4ff);
    }
    .login-submit {
      margin-top: 8px;
      padding: 12px 16px;
      background: var(--hq-cyan, #00d4ff);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .login-submit:hover { opacity: 0.92; }
    .login-submit:disabled { opacity: 0.5; cursor: wait; }
    .login-error {
      margin-top: 12px;
      padding: 8px 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      display: none;
    }
    .login-error.visible { display: block; }
    .login-hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--hq-muted, #6b7280);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body class="hq-login">
  <div class="login-card">
    <div class="login-brand">
      <span class="logo-mark">✦</span>
      <span>AI Delivery</span>
    </div>
    <div class="login-tagline">HQ Panel</div>
    <div class="login-title">Вход в систему</div>

    <form class="login-form" id="loginForm" autocomplete="on">
      <div class="login-field">
        <label for="loginField">Логин</label>
        <input type="text" id="loginField" name="login" autocomplete="username" required autofocus />
      </div>
      <div class="login-field">
        <label for="passwordField">Пароль</label>
        <input type="password" id="passwordField" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-submit" id="submitBtn">Войти</button>
      <div class="login-error" id="errorBox"></div>
    </form>

    <div class="login-hint">
      Owner: логин <strong>owner</strong> + пароль из <code>.env</code>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');
      const loginField = document.getElementById('loginField');
      const passwordField = document.getElementById('passwordField');

      // Если уже залогинены — редирект сразу
      const existingToken = localStorage.getItem('hq_token');
      const existingRole = localStorage.getItem('hq_role');
      if (existingToken && existingRole) {
        redirectByRole(existingRole);
      }

      function redirectByRole(role) {
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next');
        if (next && next.indexOf('/hq/') === 0 && next.indexOf('login') === -1) {
          window.location.replace(next);
          return;
        }
        const map = {
          owner:    '/hq/',
          pm:       '/hq/delivery.html',
          executor: '/hq/my-tasks.html',
          reviewer: '/hq/review.html',
        };
        window.location.replace(map[role] || '/hq/');
      }

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.add('visible');
      }

      function hideError() {
        errorBox.classList.remove('visible');
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideError();
        submitBtn.disabled = true;
        submitBtn.textContent = 'Вход...';
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              login: loginField.value.trim(),
              password: passwordField.value,
            }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || 'HTTP ' + res.status);
          }
          const data = await res.json();
          localStorage.setItem('hq_token', data.token);
          localStorage.setItem('hq_role', data.role);
          localStorage.setItem('hq_user_id', data.user_id);
          localStorage.setItem('hq_user_name', data.name);
          // Дублируем введённый пароль в legacy storage —
          // нужно для совместимости со старыми страницами (CRM, Team и др.),
          // которые шлют X-Admin-Password. Backend проверит сам и
          // отвергнет если пароль не совпадает с ADMIN_PASSWORD —
          // тогда сработает X-Auth-Token. Никакой утечки нет.
          sessionStorage.setItem('hq_admin_password', passwordField.value);
          redirectByRole(data.role);
        } catch (err) {
          showError(err.message || 'Ошибка входа');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Войти';
        }
      });
    })();
  </script>
</body>
</html>
