<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline Run — HQ</title>
  <link rel="stylesheet" href="_base.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="hq-theme.css">
  <link rel="stylesheet" href="hq-mobile.css">
  <style>
    .run-header {
      background: var(--hq-card, #1a1a2e);
      border: 1px solid var(--hq-border, #2a2a3e);
      border-radius: 12px; padding: 16px; margin: 16px 0;
    }
    .run-title { font-size: 22px; font-weight: 600; margin: 0 0 8px; }
    .run-meta-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; color: var(--hq-text-secondary, #888); font-size: 13px; }
    .status-badge { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .status-badge.cyan   { background: rgba(34, 211, 238, 0.15); color: #67e8f9; }
    .status-badge.green  { background: rgba(34, 197, 94, 0.15);  color: #86efac; }
    .status-badge.purple { background: rgba(168, 85, 247, 0.15); color: #d8b4fe; }
    .status-badge.orange { background: rgba(251, 146, 60, 0.15); color: #fdba74; }
    .status-badge.yellow { background: rgba(250, 204, 21, 0.15); color: #fde047; }
    .status-badge.red    { background: rgba(239, 68, 68, 0.15);  color: #fca5a5; }
    .status-badge.blue   { background: rgba(96, 165, 250, 0.15); color: #93c5fd; }
    .status-badge.pink   { background: rgba(244, 114, 182, 0.15); color: #f9a8d4; }
    .status-badge.gray   { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; }
    .actions-bar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn { padding: 8px 14px; background: transparent; border: 1px solid var(--hq-border, #2a2a3e); color: inherit; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-primary { background: var(--hq-accent, #7c3aed); border-color: var(--hq-accent, #7c3aed); color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-track { margin-top: 12px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--hq-accent, #7c3aed); transition: width 0.3s; }
    .phase-pills { display: flex; gap: 4px; margin-top: 12px; flex-wrap: wrap; }
    .phase-pill { padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.05); font-size: 11px; }
    .phase-pill.done { background: rgba(34, 197, 94, 0.2); color: #86efac; }
    .phase-pill.active { background: rgba(34, 211, 238, 0.2); color: #67e8f9; }

    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--hq-border, #2a2a3e); margin: 16px 0 0; overflow-x: auto; }
    .tab { padding: 10px 16px; background: transparent; border: none; color: var(--hq-text-secondary, #888); cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab.active { color: var(--hq-accent, #a855f7); border-bottom-color: var(--hq-accent, #a855f7); }
    .tab-panel { display: none; padding: 16px 0; }
    .tab-panel.active { display: block; }

    .events-list { display: flex; flex-direction: column; gap: 8px; }
    .event-row { padding: 10px 14px; background: var(--hq-card, #1a1a2e); border-radius: 8px; border-left: 3px solid var(--hq-border, #2a2a3e); }
    .event-row.severity-warning { border-left-color: #fbbf24; }
    .event-row.severity-error { border-left-color: #ef4444; }
    .event-type { font-weight: 500; font-size: 13px; }
    .event-payload { color: var(--hq-text-secondary, #888); font-size: 12px; margin-top: 4px; font-family: ui-monospace, monospace; word-break: break-all; }
    .event-time { color: var(--hq-text-secondary, #666); font-size: 11px; margin-top: 4px; }

    .docs-content { padding: 16px; background: var(--hq-card, #1a1a2e); border-radius: 12px; }
    .docs-content pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    .docs-empty { padding: 40px 20px; text-align: center; color: var(--hq-text-secondary, #888); }

    @media (max-width: 768px) {
      .actions-bar { gap: 6px; }
      .actions-bar .btn { padding: 8px 10px; font-size: 12px; }
      .tabs { font-size: 13px; }
      .tab { padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <div class="hq-shell">
    <aside class="hq-sidebar"><nav class="hq-sidebar-nav"></nav></aside>
    <main class="hq-main">
      <header class="hq-topbar">
        <a href="pipeline.html" style="text-decoration: none; color: inherit; font-size: 14px;">← AI Pipeline</a>
      </header>

      <div class="run-header" id="run-header">
        <div style="text-align: center; padding: 40px;">Загрузка...</div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="docs">Documents</button>
        <button class="tab" data-tab="sprints">Sprints</button>
        <button class="tab" data-tab="events">Events</button>
      </div>

      <div class="tab-panel active" id="tab-overview">
        <h3>Текущая фаза</h3>
        <div id="current-phase" style="padding: 16px; background: var(--hq-card, #1a1a2e); border-radius: 12px;">—</div>
        <h3 style="margin-top: 24px;">Последние события</h3>
        <div id="recent-events" class="events-list"></div>
      </div>

      <div class="tab-panel" id="tab-docs">
        <div class="docs-empty">PRD/Architecture rendering — backlog v1.1 (требует marked.js + workspace API).</div>
      </div>

      <div class="tab-panel" id="tab-sprints">
        <div id="sprints-list">Загрузка...</div>
      </div>

      <div class="tab-panel" id="tab-events">
        <div id="all-events" class="events-list"></div>
      </div>
    </main>
  </div>

  <script src="_components.js"></script>
  <script src="hq-global.js"></script>
  <script src="hq-mobile.js"></script>
  <script src="hq-pipeline.js"></script>
  <script>
    const PHASE_ORDER = ['prompt','prd','architecture','sprints','execution','validation','handoff'];
    const params = new URLSearchParams(location.search);
    const runId = parseInt(params.get('id'), 10);
    let run = null;
    let lastEventId = 0;
    let ws = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof ensureAuthenticated === 'function') ensureAuthenticated();
      if (typeof initSidebar === 'function') initSidebar();
      if (typeof applyRoleVisibility === 'function') applyRoleVisibility();
      if (!Number.isFinite(runId)) {
        document.getElementById('run-header').innerHTML = '<div style="padding: 40px; text-align: center;">Не указан ?id=N в URL</div>';
        return;
      }
      bindTabs();
      await loadRun();
      await loadEvents();
      ws = HQPipeline.connectWebSocket(runId, onWsEvent, onWsClose);
    });

    function bindTabs() {
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
      });
    }

    async function loadRun() {
      try {
        run = await HQPipeline.getRun(runId);
        renderHeader(run);
        renderCurrentPhase(run);
      } catch (err) {
        if (err.message === 'UNAUTHORIZED') { location.href = 'login.html'; return; }
        document.getElementById('run-header').innerHTML = '<div style="padding: 40px;">Ошибка: ' + err.message + '</div>';
      }
    }

    function renderHeader(r) {
      const colorClass = HQPipeline.statusColor(r.status);
      const statusLabel = HQPipeline.statusLabel(r.status);
      const idx = PHASE_ORDER.indexOf(r.current_phase);
      const progress = r.status === 'done' ? 100 : (idx >= 0 ? Math.round((idx + 1) / 7 * 100) : 0);

      const canApprove = r.status === 'awaiting_approval';
      document.getElementById('run-header').innerHTML = `
        <div style="display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap;">
          <div style="flex: 1; min-width: 250px;">
            <div class="run-title">#${r.id} — ${escapeHtml(r.title || '(без названия)')}</div>
            <div class="run-meta-row">
              <span class="status-badge ${colorClass}">${statusLabel}</span>
              <span>🎯 ${escapeHtml(r.project_type || '')}</span>
              <span>autonomy: ${r.autonomy_level}</span>
              <span>deploy: ${escapeHtml(r.deploy_strategy || 'none')}</span>
            </div>
          </div>
          <div class="actions-bar">
            <button class="btn btn-primary" id="btn-approve" ${canApprove ? '' : 'disabled'}>Approve</button>
            <button class="btn" disabled title="v1.1">Pause</button>
            <button class="btn" disabled title="v1.1">Resume</button>
            <button class="btn" disabled title="v1.1">Abort</button>
          </div>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width: ${progress}%"></div></div>
        <div class="phase-pills">
          ${PHASE_ORDER.map((p, i) => {
            let cls = '';
            if (idx > i || r.status === 'done') cls = 'done';
            else if (idx === i) cls = 'active';
            return `<span class="phase-pill ${cls}">${HQPipeline.phaseLabel(p)}</span>`;
          }).join('')}
        </div>
      `;
      const approveBtn = document.getElementById('btn-approve');
      if (approveBtn) approveBtn.addEventListener('click', onApprove);
    }

    function renderCurrentPhase(r) {
      const el = document.getElementById('current-phase');
      el.innerHTML = `
        <div style="font-size: 16px; font-weight: 500;">${HQPipeline.phaseLabel(r.current_phase || '')}</div>
        <div style="color: var(--hq-text-secondary, #888); font-size: 13px; margin-top: 4px;">
          status: ${HQPipeline.statusLabel(r.status)}
          ${r.error_message ? '<br><span style="color: #fca5a5;">Error: ' + escapeHtml(r.error_message) + '</span>' : ''}
        </div>
      `;
    }

    async function loadEvents() {
      try {
        const result = await HQPipeline.getEvents(runId, { limit: 100 });
        const events = result.events || [];
        if (events.length > 0) lastEventId = Math.max(...events.map(e => e.id));
        renderAllEvents(events);
        renderRecentEvents(events.slice(0, 10));
        loadSprints();
      } catch (err) {
        if (err.message === 'UNAUTHORIZED') { location.href = 'login.html'; return; }
        console.error('loadEvents:', err);
      }
    }

    function renderAllEvents(events) {
      const el = document.getElementById('all-events');
      if (!events.length) { el.innerHTML = '<div class="docs-empty">Нет событий</div>'; return; }
      el.innerHTML = events.map(e => `
        <div class="event-row severity-${e.severity || 'info'}">
          <div class="event-type">${escapeHtml(e.event_type)}</div>
          ${e.payload && Object.keys(e.payload).length ? `<div class="event-payload">${escapeHtml(JSON.stringify(e.payload))}</div>` : ''}
          <div class="event-time">${escapeHtml(e.created_at)}</div>
        </div>
      `).join('');
    }

    function renderRecentEvents(events) {
      const el = document.getElementById('recent-events');
      if (!events.length) { el.innerHTML = '<div class="docs-empty">Нет событий</div>'; return; }
      el.innerHTML = events.slice(0, 5).map(e => `
        <div class="event-row severity-${e.severity || 'info'}">
          <div class="event-type">${escapeHtml(e.event_type)}</div>
          <div class="event-time">${escapeHtml(e.created_at)}</div>
        </div>
      `).join('');
    }

    async function loadSprints() {
      // pipeline_sprints listing endpoint — backlog v1.1; for now render placeholder.
      document.getElementById('sprints-list').innerHTML =
        '<div class="docs-empty">Sprints listing endpoint — backlog v1.1.<br>' +
        'События sprint_started / sprint_completed во вкладке Events дают тот же signal.</div>';
    }

    async function onApprove() {
      try {
        await HQPipeline.approveRun(runId);
        await loadRun();
      } catch (err) {
        alert('Approve failed: ' + err.message);
      }
    }

    function onWsEvent(event) {
      if (!event || !event.id) return;
      // Append to all-events at top
      const allEl = document.getElementById('all-events');
      const html = `
        <div class="event-row severity-${event.severity || 'info'}">
          <div class="event-type">${escapeHtml(event.event_type)} <span style="color:#67e8f9;font-size:10px;">[live]</span></div>
          ${event.payload && Object.keys(event.payload).length ? `<div class="event-payload">${escapeHtml(JSON.stringify(event.payload))}</div>` : ''}
          <div class="event-time">${escapeHtml(event.created_at)}</div>
        </div>
      `;
      const placeholder = allEl.querySelector('.docs-empty');
      if (placeholder) placeholder.remove();
      allEl.insertAdjacentHTML('afterbegin', html);
      lastEventId = Math.max(lastEventId, event.id);
      // Refresh header on phase boundary or terminal events
      if (['phase_started', 'phase_completed', 'run_completed', 'run_failed', 'paused', 'approval_needed', 'handoff_complete'].includes(event.event_type)) {
        loadRun();
      }
    }

    function onWsClose() {
      console.warn('Pipeline WS closed; falling back to 5s polling');
      setInterval(async () => {
        const r = await HQPipeline.getEvents(runId, { since: lastEventId, limit: 50 });
        (r.events || []).reverse().forEach(onWsEvent);
        loadRun();
      }, 5000);
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    window.addEventListener('beforeunload', () => {
      if (ws) try { ws.close(); } catch (_) {}
    });
  </script>
</body>
</html>
