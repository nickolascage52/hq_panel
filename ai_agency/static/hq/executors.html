<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <base href="/hq/" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Исполнители — AI Delivery HQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/hq/style.css" />
  <link rel="stylesheet" href="/hq/_base.css" />
  <link rel="stylesheet" href="hq-mobile.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="/hq/_components.js"></script>
  <style>
    .exec-page { flex:1; display:flex; flex-direction:column; min-height:0; }
    .filter-bar {
      display:flex; gap:8px; padding:10px 16px; border-bottom:1px solid var(--hq-border); flex-shrink:0;
      align-items:center; flex-wrap:wrap;
    }
    .filter-btn {
      padding:5px 12px; border-radius:16px; font-size:12px; font-weight:500;
      border:1px solid var(--hq-border); background:transparent;
      color:var(--hq-text-secondary); cursor:pointer; transition:all .15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background:rgba(124,58,237,.12); border-color:rgba(124,58,237,.35); color:var(--hq-text);
    }
    .executors-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px;
      padding:14px 16px 20px; overflow-y:auto; flex:1;
    }
    .executor-card {
      background:var(--hq-card); border:1px solid var(--hq-border); border-radius:var(--r-lg,12px);
      padding:16px; transition:border-color .2s; cursor:pointer;
    }
    .executor-card:hover { border-color:rgba(124,58,237,.3); }
    .executor-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .executor-avatar {
      width:42px; height:42px; border-radius:50%;
      background:linear-gradient(135deg,#7c3aed,#a855f7);
      display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:700; color:#fff; flex-shrink:0;
    }
    .executor-name { font-size:15px; font-weight:600; color:var(--hq-text); }
    .executor-role { font-size:12px; color:var(--hq-text-secondary); margin-top:2px; }
    .executor-badges { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .badge-level {
      padding:3px 8px; border-radius:10px; font-size:11px; font-weight:600;
    }
    .badge-level.junior { background:rgba(100,116,139,.15); color:#94a3b8; }
    .badge-level.middle { background:rgba(124,58,237,.15); color:#a855f7; }
    .badge-level.senior { background:rgba(245,158,11,.15); color:#f59e0b; }
    .badge-status {
      padding:3px 8px; border-radius:10px; font-size:11px; font-weight:500;
    }
    .executor-stats {
      display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px;
    }
    .stat-box {
      background:rgba(255,255,255,.03); border-radius:8px; padding:8px; text-align:center;
    }
    .stat-box .stat-val { font-size:20px; font-weight:700; color:var(--hq-text); }
    .stat-box .stat-lbl { font-size:10px; color:var(--hq-text-secondary); margin-top:2px; }
    .executor-contacts { display:flex; gap:8px; flex-wrap:wrap; }
    .contact-chip {
      display:flex; align-items:center; gap:4px;
      background:rgba(255,255,255,.04); border-radius:8px;
      padding:4px 8px; font-size:12px; color:var(--hq-text-secondary); text-decoration:none;
    }
    .contact-chip:hover { background:rgba(255,255,255,.08); }
    .load-bar {
      height:4px; background:rgba(255,255,255,.06); border-radius:2px;
      margin-bottom:12px; overflow:hidden;
    }
    .load-bar-fill { height:100%; border-radius:2px; transition:width .3s; }
    .tasks-drawer {
      position:fixed; right:0; top:0; bottom:0; width:min(420px,100%);
      background:var(--hq-card); border-left:1px solid var(--hq-border); z-index:200;
      display:flex; flex-direction:column; animation:slideInRight .2s ease;
    }
    @keyframes slideInRight {
      from { transform:translateX(100%); }
      to { transform:translateX(0); }
    }
    .tasks-drawer-header {
      padding:16px 20px; border-bottom:1px solid var(--hq-border);
      display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
    }
    .tasks-drawer-body { flex:1; overflow-y:auto; padding:12px; }
    .task-mini-card {
      background:rgba(255,255,255,.03); border:1px solid var(--hq-border);
      border-radius:10px; padding:10px 12px; margin-bottom:8px;
    }
    .task-mini-title { font-size:13px; font-weight:500; color:var(--hq-text); }
    .task-mini-meta { font-size:11px; color:var(--hq-text-secondary); margin-top:4px; }
    .empty-state { text-align:center; padding:60px 20px; color:var(--hq-muted); }
  </style>
</head>
<body class="hq-body">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo"><span class="logo-mark">✦</span> AI Delivery</div>
      <div class="sidebar-tag">HQ Panel</div>
    </div>
    <nav class="nav"></nav>
    <div class="sidebar-footer">
      <div class="sys-status online"><span class="status-dot"></span><span class="status-label">Онлайн</span></div>
      <div class="sidebar-version">v4.0</div>
    </div>
  </aside>
  <div class="hq-main exec-page">
    <header class="topbar">
      <span class="topbar-title">Исполнители</span>
      <div class="topbar-right" style="display:flex;align-items:center;gap:12px">
        <span id="exec-count" style="font-size:13px;color:var(--hq-text-secondary)"></span>
        <button type="button" onclick="openAddExecutorModal(null)" class="btn btn-primary btn-sm" data-roles="owner,pm">
          + Исполнитель
        </button>
      </div>
    </header>

    <div class="filter-bar">
      <button type="button" class="filter-btn filter-load active" data-load="all">Все</button>
      <button type="button" class="filter-btn filter-load" data-load="available">Доступен</button>
      <button type="button" class="filter-btn filter-load" data-load="busy">Загружен</button>
      <button type="button" class="filter-btn filter-load" data-load="overloaded">Перегружен</button>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button type="button" class="filter-btn filter-level" data-level="junior">Junior</button>
        <button type="button" class="filter-btn filter-level" data-level="middle">Middle</button>
        <button type="button" class="filter-btn filter-level" data-level="senior">Senior</button>
      </div>
    </div>

    <div class="executors-grid" id="executors-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <div style="font-size:32px;margin-bottom:8px">⏳</div>
        <p>Загрузка...</p>
      </div>
    </div>
  </div>

  <div class="tasks-drawer" id="tasks-drawer" style="display:none">
    <div class="tasks-drawer-header">
      <div>
        <div id="drawer-executor-name" style="font-size:15px;font-weight:600"></div>
        <div id="drawer-executor-role" style="font-size:12px;color:var(--hq-text-secondary);margin-top:2px"></div>
      </div>
      <button type="button" onclick="closeTasksDrawer()"
        class="btn btn-ghost btn-sm" style="min-width:32px" aria-label="Закрыть">×</button>
    </div>
    <div class="tasks-drawer-body" id="drawer-tasks-body">
      <p style="color:var(--hq-text-secondary);font-size:13px">Загрузка...</p>
    </div>
  </div>

  <div id="toast-container" class="toast-host"></div>

  <script>
    (function () {
      var allExecutors = [];
      var currentFilter = { load: 'all', level: null };

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      async function loadExecutors() {
        try {
          var res = await window.apiAuth('/api/delivery/executors');
          allExecutors = (res && res.executors) ? res.executors : [];
          var n = document.getElementById('exec-count');
          if (n) n.textContent = allExecutors.length + ' исполнителей';
          applyFilters();
        } catch (e) {
          document.getElementById('executors-grid').innerHTML =
            '<div class="empty-state" style="grid-column:1/-1"><p>Ошибка загрузки: ' + escapeHtml(e.message) + '</p></div>';
        }
      }

      function renderExecutors(list) {
        var grid = document.getElementById('executors-grid');
        if (!list.length) {
          grid.innerHTML =
            '<div class="empty-state" style="grid-column:1/-1">' +
            '<div style="font-size:40px;margin-bottom:12px">👥</div>' +
            '<p>Нет исполнителей</p>' +
            '<button type="button" onclick="openAddExecutorModal(null)" class="btn btn-primary" data-roles="owner,pm" style="margin-top:12px">+ Добавить первого</button>' +
            '</div>';
          if (window.applyRoleVisibility) window.applyRoleVisibility();
          return;
        }

        var levelLabel = { junior: 'Junior', middle: 'Middle', senior: 'Senior' };
        var statusLabel = {
          'Доступен': '🟢 Доступен',
          'Загружен': '🟡 Загружен',
          'Высокая загрузка': '🟠 Высокая загрузка',
          'Перегружен': '🔴 Перегружен',
          'На паузе': '⏸ На паузе',
          'Неактивен': '⚫ Неактивен'
        };

        grid.innerHTML = list.map(function (e) {
          var initials = (e.name || '?').split(/\s+/).map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
          var loadPct = Math.min(100, (e.total_active || 0) * 20);
          var lv = (e.level || 'middle').toLowerCase();
          if (['junior','middle','senior'].indexOf(lv) < 0) lv = 'middle';
          var loadText = statusLabel[e.load_status] || e.load_status;
          var loadColor = e.load_color || '#606060';
          return (
            '<div class="executor-card" data-exec-id="' + e.id + '">' +
            '<div class="executor-header">' +
            '<div class="executor-avatar">' + escapeHtml(initials) + '</div>' +
            '<div style="flex:1;min-width:0">' +
            '<div class="executor-name">' + escapeHtml(e.name) + '</div>' +
            '<div class="executor-role">' + escapeHtml(e.role || 'Исполнитель') + ' · ' + escapeHtml(e.specialization || '') + '</div>' +
            '</div>' +
            '<button type="button" class="btn btn-ghost btn-icon" data-roles="owner,pm" data-edit-exec="' + e.id + '" title="Редактировать" onclick="event.stopPropagation();openEditExecutorModal(' + e.id + ')">' +
            '<i data-lucide="pencil"></i></button>' +
            '</div>' +
            '<div class="executor-badges">' +
            '<span class="badge-level ' + lv + '">' + (levelLabel[lv] || 'Middle') + '</span>' +
            '<span class="badge-status" style="background:rgba(0,0,0,.2);color:' + loadColor + '">' + loadText + '</span>' +
            '</div>' +
            '<div class="load-bar"><div class="load-bar-fill" style="width:' + loadPct + '%;background:' + loadColor + '"></div></div>' +
            '<div class="executor-stats">' +
            '<div class="stat-box"><div class="stat-val" style="color:var(--hq-cyan)">' + (e.total_active || 0) + '</div><div class="stat-lbl">В работе</div></div>' +
            '<div class="stat-box"><div class="stat-val" style="color:' + ((e.delivery_review || 0) > 0 ? '#f59e0b' : 'var(--hq-text)') + '">' + (e.delivery_review || 0) + '</div><div class="stat-lbl">На проверке</div></div>' +
            '<div class="stat-box"><div class="stat-val" style="color:' + ((e.delivery_overdue || 0) > 0 ? '#ef4444' : 'var(--hq-text)') + '">' + (e.delivery_overdue || 0) + '</div><div class="stat-lbl">Просрочено</div></div>' +
            '</div>' +
            '<div class="executor-contacts">' +
            (e.telegram ? '<a class="contact-chip" href="https://t.me/' + escapeHtml(String(e.telegram).replace(/^@/, '')) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()"><i data-lucide="send" style="width:12px;height:12px"></i>' + escapeHtml(e.telegram) + '</a>' : '') +
            (e.github_username ? '<a class="contact-chip" href="https://github.com/' + escapeHtml(e.github_username) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()"><i data-lucide="github" style="width:12px;height:12px"></i>' + escapeHtml(e.github_username) + '</a>' : '') +
            (e.email ? '<a class="contact-chip" href="mailto:' + escapeHtml(e.email) + '" onclick="event.stopPropagation()"><i data-lucide="mail" style="width:12px;height:12px"></i>' + escapeHtml(e.email) + '</a>' : '') +
            '</div></div>'
          );
        }).join('');

        grid.querySelectorAll('.executor-card').forEach(function (card) {
          card.addEventListener('click', function () {
            var id = parseInt(card.getAttribute('data-exec-id'), 10);
            if (id) openTasksDrawer(id);
          });
        });
        if (window.applyRoleVisibility) window.applyRoleVisibility();
        if (window.lucide && lucide.createIcons) lucide.createIcons();
      }

      function applyFilters() {
        var filtered = allExecutors.slice();
        if (currentFilter.load !== 'all') {
          var map = {
            available: ['Доступен'],
            busy: ['Загружен', 'Высокая загрузка'],
            overloaded: ['Перегружен']
          };
          var allowed = map[currentFilter.load] || [];
          filtered = filtered.filter(function (e) { return allowed.indexOf(e.load_status) !== -1; });
        }
        if (currentFilter.level) {
          filtered = filtered.filter(function (e) {
            var L = (e.level || 'middle').toLowerCase();
            return L === currentFilter.level;
          });
        }
        renderExecutors(filtered);
      }

      function bindFilters() {
        document.querySelectorAll('.filter-load').forEach(function (btn) {
          btn.addEventListener('click', function () {
            document.querySelectorAll('.filter-load').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            currentFilter.load = btn.getAttribute('data-load') || 'all';
            applyFilters();
          });
        });
        document.querySelectorAll('.filter-level').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var lv = btn.getAttribute('data-level');
            if (currentFilter.level === lv) {
              currentFilter.level = null;
              btn.classList.remove('active');
            } else {
              document.querySelectorAll('.filter-level').forEach(function (b) { b.classList.remove('active'); });
              currentFilter.level = lv;
              btn.classList.add('active');
            }
            applyFilters();
          });
        });
      }

      window.openTasksDrawer = async function (executorId) {
        var exec = allExecutors.find(function (x) { return x.id === executorId; });
        if (!exec) return;
        var drawer = document.getElementById('tasks-drawer');
        document.getElementById('drawer-executor-name').textContent = exec.name || '';
        document.getElementById('drawer-executor-role').textContent = (exec.role || '') + ' · ' + (exec.load_status || '');
        document.getElementById('drawer-tasks-body').innerHTML = '<p style="color:var(--hq-text-secondary);font-size:13px">Загрузка задач...</p>';
        drawer.style.display = 'flex';
        try {
          var data = await window.apiAuth('/api/delivery/executors/' + executorId + '/tasks');
          var dv = data.delivery_tasks || [];
          var tv = data.tasks_v2 || [];
          var allTasks = dv.map(function (t) { t._source = 'delivery'; return t; })
            .concat(tv.map(function (t) { t._source = 'tasks_v2'; return t; }));
          if (!allTasks.length) {
            document.getElementById('drawer-tasks-body').innerHTML =
              '<div class="empty-state"><div style="font-size:32px">✅</div><p>Нет активных задач</p></div>';
            return;
          }
          var statusColors = {
            'In Progress': '#7c3aed',
            Review: '#f59e0b',
            Blocked: '#ef4444',
            'в работе': '#7c3aed',
            'на проверке': '#f59e0b',
            новая: '#606060'
          };
          var today = new Date().toISOString().slice(0, 10);
          document.getElementById('drawer-tasks-body').innerHTML = allTasks.map(function (t) {
            var title = t.title || '—';
            var project = t.project_name || '';
            var st = t.status || '';
            var deadline = t.deadline || t.due_date || '';
            var isOverdue = deadline && String(deadline).slice(0, 10) < today;
            var statusColor = statusColors[st] || '#606060';
            var src = (t._source === 'delivery') ? 'Production' : 'HQ';
            return (
              '<div class="task-mini-card">' +
              '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">' +
              '<div class="task-mini-title" style="flex:1">' + escapeHtml(title) + '</div>' +
              '<span style="font-size:10px;font-weight:600;color:' + statusColor + ';background:rgba(0,0,0,.3);padding:2px 6px;border-radius:8px;white-space:nowrap">' + escapeHtml(st) + '</span>' +
              '</div>' +
              '<div class="task-mini-meta">' +
              escapeHtml(src) +
              (project ? ' · 📁 ' + escapeHtml(project) : '') +
              (deadline ? ' · 📅 <span style="color:' + (isOverdue ? '#ef4444' : 'inherit') + '">' + escapeHtml(String(deadline).slice(0, 10)) + '</span>' : '') +
              (isOverdue ? ' ⚠️' : '') +
              '</div></div>'
            );
          }).join('');
        } catch (err) {
          document.getElementById('drawer-tasks-body').innerHTML =
            '<p style="color:#ef4444">' + escapeHtml(err.message || 'Ошибка') + '</p>';
        }
      };

      window.closeTasksDrawer = function () {
        document.getElementById('tasks-drawer').style.display = 'none';
      };

      window.openAddExecutorModal = async function (executorId) {
        var executor = null;
        var users = [];
        try {
          var uj = await window.apiAuth('/api/users');
          users = (uj && uj.users) ? uj.users : [];
        } catch (e1) {}

        if (executorId) {
          executor = allExecutors.find(function (x) { return x.id === executorId; });
          if (!executor) {
            try {
              var r2 = await window.apiAuth('/api/delivery/executors');
              var lst = r2.executors || [];
              executor = lst.find(function (x) { return x.id === executorId; });
            } catch (e2) {}
          }
        }

        var rm = document.getElementById('add-executor-modal');
        if (rm) rm.remove();
        var modal = document.createElement('div');
        modal.id = 'add-executor-modal';
        modal.style.cssText =
          'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;' +
          'align-items:center;justify-content:center;padding:20px;box-sizing:border-box';
        modal.innerHTML =
          '<div style="background:var(--hq-card);border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:24px;width:500px;max-width:100%;max-height:85vh;overflow-y:auto;margin:20px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">' +
          '<h3 style="margin:0;font-size:16px;font-weight:600;color:var(--hq-text)">' + (executorId ? 'Редактировать исполнителя' : 'Новый исполнитель') + '</h3>' +
          '<button type="button" class="modal-close" onclick="(function(){var m=document.getElementById(\'add-executor-modal\');if(m)m.remove();})()">&times;</button></div>' +
          '<div id="exec-form-inner"></div></div>';

        document.body.appendChild(modal);

        var usersOptions = users.filter(function (u) { return (u.status || 'active') === 'active'; }).map(function (u) {
          return '<option value="' + u.id + '"' + ((executor && executor.user_id === u.id) ? ' selected' : '') + '>' + escapeHtml(u.name) + ' (' + escapeHtml(u.login) + ')</option>';
        }).join('');

        var roles = ['Frontend developer','Backend developer','Fullstack developer','Designer','AI engineer','Automation specialist','QA','Project manager','Tech lead','Content/SEO'];
        var roleSel = roles.map(function (r) {
          return '<option value="' + escapeHtml(r).replace(/"/g, '&quot;') + '"' + ((executor && executor.role === r) ? ' selected' : '') + '>' + escapeHtml(r) + '</option>';
        }).join('');
        var stList = ['Доступен','Загружен','На паузе','Неактивен'];
        var statusSel = stList.map(function (s) {
          return '<option value="' + s + '"' + ((executor && executor.status === s) ? ' selected' : '') + '>' + s + '</option>';
        }).join('');

        var lv = executor ? (executor.level || 'middle').toLowerCase() : 'middle';

        document.getElementById('exec-form-inner').innerHTML =
          '<div style="display:flex;flex-direction:column;gap:12px">' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
          '<div><label style="font-size:11px;color:var(--hq-muted);display:block;margin-bottom:4px">Имя *</label>' +
          '<input id="ae-name" value="' + escapeHtml(executor ? executor.name : '') + '" class="hq-input" style="width:100%" placeholder="Иван Иванов"></div>' +
          '<div><label style="font-size:11px;color:var(--hq-muted);display:block;margin-bottom:4px">Роль</label>' +
          '<select id="ae-role" class="hq-input" style="width:100%">' + roleSel + '</select></div></div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
          '<div><label style="font-size:11px;color:var(--hq-muted);display:block;margin-bottom:4px">Уровень</label>' +
          '<select id="ae-level" class="hq-input" style="width:100%">' +
          '<option value="junior"' + (lv === 'junior' ? ' selected' : '') + '>Junior</option>' +
          '<option value="middle"' + (lv !== 'junior' && lv !== 'senior' ? ' selected' : '') + '>Middle</option>' +
          '<option value="senior"' + (lv === 'senior' ? ' selected' : '') + '>Senior</option>' +
          '</select></div>' +
          '<div><label style="font-size:11px;color:var(--hq-muted);display:block;margin-bottom:4px">Статус</label>' +
          '<select id="ae-status" class="hq-input" style="width:100%">' + statusSel + '</select></div></div>' +
          '<div><label style="font-size:11px;color:var(--hq-muted);display:block;margin-bottom:4px">Специализация</label>' +
          '<input id="ae-spec" value="' + escapeHtml(executor ? (executor.specialization || '') : '') + '" class="hq-input" style="width:100%" placeholder="React, FastAPI, n8n..."></div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
          '<div><label style="font-size:11px;color:var(--hq-muted);display:block;margin-bottom:4px">Telegram</label>' +
          '<input id="ae-tg" value="' + escapeHtml(executor ? (executor.telegram || '') : '') + '" class="hq-input" style="width:100%" placeholder="@username"></div>' +
          '<div><label style="font-size:11px;color:var(--hq-muted);display:block;margin-bottom:4px">GitHub</label>' +
          '<input id="ae-gh" value="' + escapeHtml(executor ? (executor.github_username || '') : '') + '" class="hq-input" style="width:100%" placeholder="username"></div></div>' +
          '<div><label style="font-size:11px;color:var(--hq-muted);display:block;margin-bottom:4px">Привязать к пользователю HQ</label>' +
          '<select id="ae-user" class="hq-input" style="width:100%">' +
          '<option value="">Не привязан (внешний исполнитель)</option>' + usersOptions + '</select></div>' +
          '<div style="display:flex;gap:8px;margin-top:8px">' +
          '<button type="button" class="btn btn-primary" style="flex:1" id="btn-save-exec">' + (executorId ? 'Сохранить' : 'Добавить') + '</button>' +
          '<button type="button" class="btn btn-ghost" onclick="(function(){var m=document.getElementById(\'add-executor-modal\');if(m)m.remove();})()">Отмена</button>' +
          '</div></div>';

        modal.addEventListener('click', function (e) {
          if (e.target === modal) modal.remove();
        });

        document.getElementById('btn-save-exec').onclick = function () {
          window.saveExecutor(executorId);
        };
      };

      window.openEditExecutorModal = function (id) {
        window.openAddExecutorModal(id);
      };

      window.saveExecutor = async function (executorId) {
        var name = document.getElementById('ae-name') && document.getElementById('ae-name').value.trim();
        if (!name) {
          window.showToast('Введите имя', 'error');
          return;
        }
        var userVal = document.getElementById('ae-user') && document.getElementById('ae-user').value;
        var payload = {
          name: name,
          role: document.getElementById('ae-role') && document.getElementById('ae-role').value,
          level: document.getElementById('ae-level') && document.getElementById('ae-level').value,
          status: document.getElementById('ae-status') && document.getElementById('ae-status').value,
          specialization: (document.getElementById('ae-spec') && document.getElementById('ae-spec').value) || '',
          telegram: (document.getElementById('ae-tg') && document.getElementById('ae-tg').value) || '',
          github_username: (document.getElementById('ae-gh') && document.getElementById('ae-gh').value) || '',
          user_id: userVal ? parseInt(userVal, 10) : null
        };
        try {
          if (executorId) {
            await window.apiAuth('/api/delivery/executors/' + executorId, 'PUT', payload);
            window.showToast('Исполнитель обновлён', 'success');
          } else {
            await window.apiAuth('/api/delivery/executors', 'POST', payload);
            window.showToast('Исполнитель добавлен', 'success');
          }
          var rm2 = document.getElementById('add-executor-modal');
          if (rm2) rm2.remove();
          await loadExecutors();
        } catch (e) {
          window.showToast(e.message || 'Ошибка', 'error');
        }
      };

      document.addEventListener('click', function (e) {
        var drawer = document.getElementById('tasks-drawer');
        if (!drawer || drawer.style.display === 'none') return;
        if (drawer.contains(e.target)) return;
        if (e.target.closest && e.target.closest('.executor-card')) return;
        if (e.target.closest && e.target.closest('.filter-bar')) return;
        if (e.target.closest && e.target.closest('header')) return;
        closeTasksDrawer();
      });

      document.addEventListener('DOMContentLoaded', function () {
        bindFilters();
        loadExecutors();
      });

      window.loadExecutors = loadExecutors;
    })();
  </script>
  <script src="hq-global.js"></script>
  <script src="hq-mobile.js"></script>
</body>
</html>
